[versions]
kotlin         = "2.3.20"
agp            = "9.1.0"
coreKtx        = "1.18.0"
appcompat      = "1.7.1"
preferenceKtx  = "1.2.1"
securityCrypto = "1.1.0"    # final release — deprecated in 1.1.0; no further updates; used for EncryptedSharedPreferences
sherpaOnnx     = "v1.12.29"  # JitPack requires 'v' prefix (matches upstream git tags)
matrixRustSdk  = "26.03.19"
coroutines     = "1.10.2"
robolectric    = "4.16.1"
espresso       = "3.7.0"
testRunner     = "1.6.2"
testRules      = "1.6.1"    # latest available; runner 1.6.2 is compatible
testExtJunit   = "1.2.1"
junit          = "4.13.2"

[libraries]
androidx-core-ktx        = { group = "androidx.core",                name = "core-ktx",         version.ref = "coreKtx" }
androidx-appcompat       = { group = "androidx.appcompat",            name = "appcompat",         version.ref = "appcompat" }
androidx-preference-ktx  = { group = "androidx.preference",          name = "preference-ktx",    version.ref = "preferenceKtx" }
androidx-security-crypto = { group = "androidx.security",             name = "security-crypto",   version.ref = "securityCrypto" }
sherpa-onnx-android          = { group = "com.github.k2-fsa",        name = "sherpa-onnx",                 version.ref = "sherpaOnnx" }
matrix-sdk-android           = { group = "org.matrix.rustcomponents", name = "sdk-android",                version.ref = "matrixRustSdk" }
kotlinx-coroutines-android   = { group = "org.jetbrains.kotlinx",    name = "kotlinx-coroutines-android", version.ref = "coroutines" }
kotlinx-coroutines-test      = { group = "org.jetbrains.kotlinx",    name = "kotlinx-coroutines-test",    version.ref = "coroutines" }
junit                        = { group = "junit",                     name = "junit",                      version.ref = "junit" }
robolectric                  = { group = "org.robolectric",           name = "robolectric",                version.ref = "robolectric" }
espresso-core                = { group = "androidx.test.espresso",    name = "espresso-core",              version.ref = "espresso" }
androidx-test-runner         = { group = "androidx.test",             name = "runner",                     version.ref = "testRunner" }
androidx-test-rules          = { group = "androidx.test",             name = "rules",                      version.ref = "testRules" }
androidx-test-ext-junit      = { group = "androidx.test.ext",         name = "junit",                      version.ref = "testExtJunit" }

[plugins]
android-application = { id = "com.android.application", version.ref = "agp" }
kotlin-android      = { id = "org.jetbrains.kotlin.android", version.ref = "kotlin" }
